<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Calculator Page -->
    <div class="calculator" id="calculatorPage">
        <div class="menu">
            <button class="menu-btn" onclick="toggleMenu()">&#8942;</button>
            <div class="dropdown" id="dropdownMenu">
                <p onclick="openHistory()">History</p>
            </div>
        </div>
        <div class="display-container">
            <input type="text" id="display" readonly>
        </div>
        <div class="buttons">

            <button onclick="clearDisplay()">AC</button>
            <button onclick="appendValue('%')">%</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="appendValue('/')">÷</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')">×</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">−</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')">+</button>

            <button onclick="appendValue('00')">00</button>
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>

        </div>
    </div>

    <!-- History Page -->
    <div class="history-page" id="historyPage">
        <div class="history-header">
            <button class="back-btn" onclick="closeHistory()">&#8592;</button>
                <h2>History</h2>
            <button class="delete-btn" onclick="clearHistory()">🗑</button>
        </div>
        <div id="historyList" class="history-list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
